spring:
  datasource:
    url: jdbc:mysql://localhost:3308/table_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: table_order
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: dGFibGVvcmRlci1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LTMyYnl0ZXM=
  access-token-expiry: 1800000    # 30분 (ms)
  refresh-token-expiry: 31536000000  # 365일 (ms)

server:
  port: 8080

logging:
  level:
    com.tableorder: DEBUG
