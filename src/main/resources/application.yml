spring:
  datasource:
    url: jdbc:h2:mem:tableorder;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: dGFibGVvcmRlci1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LTMyYnl0ZXM=
  access-token-expiry: 1800000    # 30분 (ms)
  refresh-token-expiry: 31536000000  # 365일 (ms)

server:
  port: 8080
